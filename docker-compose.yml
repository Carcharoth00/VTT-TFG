services:

  mysql:
    image: mysql:8
    container_name: vtt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: vtt_root_password
      MYSQL_DATABASE: vtt_database
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vtt-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: vtt_root_password
      DB_NAME: vtt_database
      DB_PORT: 3306
      JWT_SECRET: cambiar_en_produccion
      CORS_ORIGIN: http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build: .
    container_name: vtt-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: