<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <button (click)="goBack()" class="btn-back">← Dashboard</button>
      <h1>Mi Perfil</h1>
    </div>

    <div *ngIf="message" class="success-alert">✅ {{ message }}</div>
    <div *ngIf="error" class="error-alert">⚠️ {{ error }}</div>

    <div class="avatar-section">
      <div class="avatar-wrapper">
        <img *ngIf="avatar" [src]="avatar" class="profile-avatar" alt="avatar"/>
        <div *ngIf="!avatar" class="avatar-placeholder">
          {{ user?.username?.charAt(0)?.toUpperCase() }}
        </div>
      </div>
      <input type="file" accept="image/*" (change)="onAvatarUpload($event)" #avatarInput style="display:none">
      <button (click)="avatarInput.click()" class="btn-upload-avatar">Cambiar imagen</button>
    </div>

    <div class="form-group">
      <label>Nombre de usuario</label>
      <input [(ngModel)]="username" placeholder="Tu nombre de usuario"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [value]="user?.email" disabled class="input-disabled"/>
    </div>

    <div class="profile-actions">
      <button (click)="saveProfile()" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Guardando...' : 'Guardar cambios' }}
      </button>
      <a routerLink="/forgot-password" class="link">Cambiar contraseña</a>
    </div>
  </div>
</div>
