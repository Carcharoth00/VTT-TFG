<div class="auth-container">
    <div class="auth-card">
        <h1>🎲 VTT</h1>
        <h2>Recuperar contraseña</h2>
        <p>Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

        <div *ngIf="message" class="success-alert">✅ {{ message }}</div>
        <div *ngIf="error" class="error-alert">⚠️ {{ error }}</div>

        <form (ngSubmit)="onSubmit()" *ngIf="!message">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com"
                        [disabled]="isLoading" required style="padding-left: 2.5rem;">
                </div>
            </div>
            <button type="submit" class="btn-submit" [disabled]="isLoading || !email">
                {{ isLoading ? 'Enviando...' : 'Enviar enlace' }}
            </button>
        </form>

        <div class="auth-footer">
            <a routerLink="/login" class="link">← Volver al login</a>
        </div>
    </div>
</div>
