<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>🎲 VTT</h1>
      <h2>Crear Cuenta</h2>
      <p>Únete a la aventura</p>
    </div>

    <div *ngIf="errorMessage" class="error-alert">⚠️ {{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">🧙</span>
          <input type="text" [(ngModel)]="username" name="username"
            placeholder="Tu nombre de aventurero" [disabled]="isLoading" required style="padding-left: 2.5rem;">
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" [(ngModel)]="email" name="email"
            placeholder="tu@email.com" [disabled]="isLoading" required style="padding-left: 2.5rem;">
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="password-input">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
            name="password" placeholder="Mínimo 6 caracteres" [disabled]="isLoading" required>
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" [disabled]="isLoading">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
          placeholder="Repite tu contraseña" [disabled]="isLoading" required>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Crear Cuenta</span>
        <span *ngIf="isLoading">Creando cuenta... ⏳</span>
      </button>
    </form>

    <div class="divider">o</div>

    <div class="register-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login" class="link">Inicia Sesión</a></p>
    </div>
  </div>
</div>
