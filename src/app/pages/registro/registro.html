<div class="register-container">
  <div class="register-card">
    <!-- Logo / Título -->
    <div class="register-header">
      <h1>🎲 VTT</h1>
      <h2>Crear Cuenta</h2>
      <p>Únete a la aventura</p>
    </div>

    <!-- Mensaje de Error -->
    <div *ngIf="errorMessage" class="error-alert">
      ⚠️ {{ errorMessage }}
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" class="register-form">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Nombre de Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Tu nombre de aventurero"
          [disabled]="isLoading"
          required>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          [disabled]="isLoading"
          required>
      </div>
      
      <!-- Password -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Mínimo 6 caracteres"
            [disabled]="isLoading"
            required>
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            [disabled]="isLoading">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Repite tu contraseña"
          [disabled]="isLoading"
          required>
      </div>

      <!-- Botón Submit -->
      <button
        type="submit"
        class="btn-submit"
        [disabled]="isLoading">
        <span *ngIf="!isLoading">Crear Cuenta</span>
        <span *ngIf="isLoading">Creando cuenta... ⏳</span>
      </button>
    </form>

    <!-- Link a Login -->
    <div class="register-footer">
      <p>
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="link">Inicia Sesión</a>
      </p>
    </div>
  </div>
</div>
