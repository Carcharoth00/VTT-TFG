<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>🎲 VTT</h1>
      <h2>Bienvenido de Nuevo</h2>
      <p>Inicia sesión para continuar tu aventura</p>
    </div>

    <div *ngIf="errorMessage" class="error-alert">⚠️ {{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="tu@email.com"
            [disabled]="isLoading" autocomplete="email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input">
          <span class="input-icon">🔒</span>
          <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="password" name="password"
            placeholder="Tu contraseña" [disabled]="isLoading" autocomplete="current-password" required>
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" [disabled]="isLoading">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <div class="forgot-password">
          <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Iniciando sesión... ⏳</span>
      </button>
    </form>

    <div class="divider">o</div>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/register" class="link">Regístrate Aquí</a></p>
    </div>
  </div>
</div>
