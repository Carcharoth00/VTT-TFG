<div class="auth-container">
  <div class="auth-card">
    <h1>🎲 VTT</h1>
    <h2>Nueva contraseña</h2>

    <div *ngIf="message" class="success-alert">✅ {{ message }}</div>
    <div *ngIf="error" class="error-alert">⚠️ {{ error }}</div>

    <form (ngSubmit)="onSubmit()" *ngIf="!message">
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Repite la contraseña" required>
      </div>
      <button type="submit" class="btn-submit" [disabled]="isLoading || !password || !confirmPassword">
        {{ isLoading ? 'Guardando...' : 'Restablecer contraseña' }}
      </button>
    </form>
  </div>
</div>
